services:
  tools:
    build: services/tools-mcp
    restart: unless-stopped
    stop_grace_period: 30s
    env_file: .env
    environment:
      MCP_PORT: "9001"
      FEATURE_SHAREPOINT: "true"
    volumes:
      # Isolated workspace — tools can read/write here but NOT /app/data
      - ./data/workspace:/workspace
      # Skills — read-only so agent scripts are accessible via /workspace/skills/
      - ./app/skills:/workspace/skills:ro
    mem_limit: 1g
    cpus: 1
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s=socket.create_connection(('localhost',9001),5); s.close()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  prometheus-mcp:
    build: services/prometheus-mcp
    restart: unless-stopped
    stop_grace_period: 30s
    env_file: .env          # reads PROMETHEUS_URL from .env
    environment:
      MCP_PORT: "9000"
    mem_limit: 512m
    cpus: 0.5
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s=socket.create_connection(('localhost',9000),5); s.close()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  homeagent:
    build: .
    restart: unless-stopped
    stop_grace_period: 30s
    env_file: .env
    environment:
      APP_ENV: production
      LOG_FORMAT: json
      PROMETHEUS_MCP_URL: http://prometheus-mcp:9000/mcp
    volumes:
      # Persist SQLite databases and ChromaDB across container restarts
      - ./data:/app/data
      # Allow prompt overrides without rebuilding the image
      - ./prompts:/app/prompts
    ports:
      - "8080:8080"   # webhook endpoint (cloudflared proxies this to the internet)
      - "9090:9090"   # admin dashboard — LAN only, not in cloudflared ingress
    mem_limit: 2g
    cpus: 2
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    depends_on:
      tools:
        condition: service_healthy
      prometheus-mcp:
        condition: service_healthy

  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    stop_grace_period: 15s
    # TUNNEL_TOKEN is read natively by cloudflared — no --token flag needed.
    # The ingress rule (domain → http://homeagent:8080) is configured in the
    # Cloudflare Zero Trust dashboard under the tunnel's Public Hostname tab.
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN}
    mem_limit: 256m
    cpus: 0.5
    depends_on:
      homeagent:
        condition: service_healthy
