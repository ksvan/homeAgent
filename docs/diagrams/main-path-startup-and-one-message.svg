<svg xmlns="http://www.w3.org/2000/svg" width="1740" height="1180" viewBox="0 0 1740 1180" role="img" aria-labelledby="title desc">
  <title id="title">Main Path: Startup and One Message</title>
  <desc id="desc">Primary deployed path from start.sh launch through initialization and one Telegram message run.</desc>
  <defs>
    <style>
      .bg{fill:#f8fafc}.sec{fill:#eef2ff;stroke:#475569;stroke-width:1.4;rx:12}.box{fill:#fff;stroke:#0f172a;stroke-width:1.6;rx:10}.db{fill:#ecfeff;stroke:#155e75;stroke-width:1.5;rx:10}.dec{fill:#fef3c7;stroke:#92400e;stroke-width:1.5}
      .title{font:700 28px 'Segoe UI',Arial,sans-serif;fill:#0f172a}.h{font:700 17px 'Segoe UI',Arial,sans-serif;fill:#0f172a}.t{font:13px 'Segoe UI',Arial,sans-serif;fill:#1e293b}.s{font:12px 'Segoe UI',Arial,sans-serif;fill:#334155}
      .a{stroke:#1d4ed8;stroke-width:2.2;fill:none;marker-end:url(#m)}.a2{stroke:#0f766e;stroke-width:2;fill:none;marker-end:url(#m2)}
    </style>
    <marker id="m" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L10,5 L0,10 z" fill="#1d4ed8"/></marker>
    <marker id="m2" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L10,5 L0,10 z" fill="#0f766e"/></marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1740" height="1180"/>
  <text class="title" x="30" y="54">Main Code Path: start.sh -> Initialization -> One User Message</text>

  <rect class="sec" x="30" y="90" width="780" height="500"/>
  <text class="h" x="50" y="118">1) Startup Path (Current Deployment)</text>

  <rect class="box" x="60" y="150" width="330" height="80"/>
  <text class="t" x="86" y="182">`bash start.sh up`</text><text class="t" x="86" y="204">`docker compose build && up -d`</text>

  <rect class="box" x="430" y="150" width="350" height="80"/>
  <text class="t" x="455" y="182">homeagent container starts</text><text class="t" x="455" y="204">entry: `python -m app`</text>

  <rect class="box" x="430" y="260" width="350" height="88"/>
  <text class="t" x="455" y="290">`app/__main__.py`</text>
  <text class="t" x="455" y="312">_run_migrations() -> Alembic upgrade heads</text>
  <text class="t" x="455" y="334">_run() starts main + admin uvicorn servers</text>

  <rect class="box" x="60" y="260" width="330" height="88"/>
  <text class="t" x="86" y="290">FastAPI lifespan startup:</text>
  <text class="t" x="86" y="312">configure logging + seed policies + start MCP clients</text>
  <text class="t" x="86" y="334">start scheduler + restore tasks + cleanup jobs</text>

  <rect class="box" x="60" y="385" width="720" height="165"/>
  <text class="t" x="86" y="415">Initialize webhook channel:</text>
  <text class="t" x="86" y="437">TelegramChannel(on_message=handle_incoming_message)</text>
  <text class="t" x="86" y="459">await channel.initialize(); request.app.state.telegram_channel set</text>
  <text class="t" x="86" y="481">admin sidecar serves `/admin*` on admin_port in same process</text>
  <text class="t" x="86" y="503">service now ready for Telegram webhook updates</text>

  <path class="a" d="M390 190 L430 190"/><path class="a" d="M605 230 L605 260"/><path class="a" d="M430 304 L390 304"/><path class="a" d="M225 348 L225 385"/><path class="a" d="M605 348 L605 385"/>

  <rect class="sec" x="840" y="90" width="870" height="1010"/>
  <text class="h" x="860" y="118">2) One Incoming Telegram Message</text>

  <rect class="box" x="870" y="150" width="330" height="72"/>
  <text class="t" x="894" y="180">Telegram sends webhook update</text><text class="t" x="894" y="200">POST `/webhook/telegram` + secret header</text>

  <rect class="box" x="1240" y="150" width="440" height="72"/>
  <text class="t" x="1265" y="180">webhooks.telegram_webhook()</text><text class="t" x="1265" y="200">compare_digest secret, then process_update()</text>

  <rect class="box" x="1240" y="255" width="440" height="72"/>
  <text class="t" x="1265" y="285">TelegramChannel handlers</text><text class="t" x="1265" y="305">TEXT or COMMAND -> on_message callback</text>

  <rect class="box" x="1240" y="360" width="440" height="96"/>
  <text class="t" x="1265" y="390">bot.handle_incoming_message()</text>
  <text class="t" x="1265" y="412">allowlist/rate limit + user lookup/create</text>
  <text class="t" x="1265" y="434">if slash command: commands.dispatcher path</text>

  <polygon class="dec" points="1460,486 1605,566 1460,646 1315,566"/>
  <text class="t" x="1398" y="562">slash command</text><text class="t" x="1420" y="582">handled?</text>

  <rect class="box" x="1120" y="536" width="160" height="60"/>
  <text class="t" x="1148" y="570">command reply</text>

  <rect class="box" x="1240" y="686" width="440" height="130"/>
  <text class="t" x="1265" y="716">LLM run path:</text>
  <text class="t" x="1265" y="738">assemble_context -> run_conversation(run_id,...)</text>
  <text class="t" x="1265" y="760">LLM router + prompts + Homey/Prom/Tools MCP</text>
  <text class="t" x="1265" y="782">Homey writes may require pending-action confirmation</text>
  <text class="t" x="1265" y="804">returns AgentRunResult(output,new_messages)</text>

  <rect class="box" x="1240" y="846" width="440" height="120"/>
  <text class="t" x="1265" y="876">Post-run:</text>
  <text class="t" x="1265" y="898">emit run events + save_message_pair + update snapshots</text>
  <text class="t" x="1265" y="920">schedule async memory extraction/summarization</text>
  <text class="t" x="1265" y="942">send reply text back via Telegram SDK</text>

  <rect class="db" x="870" y="996" width="810" height="96"/>
  <text class="t" x="894" y="1026">State touched in this turn: users.db, memory.db, cache.db, sqlite-vec, MCP backends</text>
  <text class="t" x="894" y="1048">Admin stream observes run/cmd/job/background events in near real time</text>

  <path class="a" d="M1200 186 L1240 186"/><path class="a" d="M1460 222 L1460 255"/><path class="a" d="M1460 327 L1460 360"/><path class="a" d="M1460 456 L1460 486"/>
  <path class="a" d="M1315 566 L1280 566"/><path class="a" d="M1460 646 L1460 686"/><path class="a" d="M1460 816 L1460 846"/>
  <path class="a2" d="M1240 906 L1170 1026"/><path class="a2" d="M1240 930 L1170 1048"/>

  <text class="s" x="30" y="1152">Reflects current launcher and webhook runtime; previous dev/prod split in start.sh has been removed.</text>
</svg>
