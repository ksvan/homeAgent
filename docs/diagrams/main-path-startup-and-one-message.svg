<svg xmlns="http://www.w3.org/2000/svg" width="1720" height="1180" viewBox="0 0 1720 1180" role="img" aria-labelledby="title desc">
  <title id="title">Main Path: Startup and One Message</title>
  <desc id="desc">Primary production path from process start through initialization and processing one Telegram message.</desc>
  <defs>
    <style>
      .bg{fill:#f8fafc}.sec{fill:#eef2ff;stroke:#475569;stroke-width:1.4;rx:12}.box{fill:#fff;stroke:#0f172a;stroke-width:1.6;rx:10}.db{fill:#ecfeff;stroke:#155e75;stroke-width:1.5;rx:10}.dec{fill:#fef3c7;stroke:#92400e;stroke-width:1.5}
      .title{font:700 28px 'Segoe UI',Arial,sans-serif;fill:#0f172a}.h{font:700 17px 'Segoe UI',Arial,sans-serif;fill:#0f172a}.t{font:13px 'Segoe UI',Arial,sans-serif;fill:#1e293b}.s{font:12px 'Segoe UI',Arial,sans-serif;fill:#334155}
      .a{stroke:#1d4ed8;stroke-width:2.2;fill:none;marker-end:url(#m)}.a2{stroke:#0f766e;stroke-width:2;fill:none;marker-end:url(#m2)}
    </style>
    <marker id="m" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L10,5 L0,10 z" fill="#1d4ed8"/></marker>
    <marker id="m2" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L10,5 L0,10 z" fill="#0f766e"/></marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1720" height="1180"/>
  <text class="title" x="30" y="54">Main Code Path: Startup -> Initialize -> Process One User Message</text>

  <rect class="sec" x="30" y="90" width="760" height="500"/>
  <text class="h" x="50" y="118">1) Process Start + Startup Initialization</text>

  <rect class="box" x="60" y="150" width="300" height="72"/>
  <text class="t" x="86" y="180">`python -m app`</text><text class="t" x="86" y="200">app/__main__.py::main()</text>

  <rect class="box" x="410" y="150" width="350" height="72"/>
  <text class="t" x="435" y="180">_run_migrations()</text><text class="t" x="435" y="200">Alembic `upgrade heads`</text>

  <rect class="box" x="410" y="260" width="350" height="90"/>
  <text class="t" x="435" y="290">APP_ENV=production -> _run_production()</text>
  <text class="t" x="435" y="312">create_app() (app/api/server.py)</text>
  <text class="t" x="435" y="334">uvicorn serves FastAPI</text>

  <rect class="box" x="60" y="260" width="320" height="90"/>
  <text class="t" x="86" y="290">FastAPI lifespan `_lifespan` startup:</text>
  <text class="t" x="86" y="312">logging + policy seed + MCP start (Homey+Prom)</text>
  <text class="t" x="86" y="334">reload_agent + scheduler + restore reminders + cleanup jobs</text>

  <rect class="box" x="60" y="390" width="700" height="160"/>
  <text class="t" x="86" y="420">Channel init in lifespan:</text>
  <text class="t" x="86" y="442">create TelegramChannel(on_message=handle_incoming_message)</text>
  <text class="t" x="86" y="464">await channel.initialize(); set channel registry; store in app.state.telegram_channel</text>
  <text class="t" x="86" y="486">system is now ready to receive webhook updates</text>

  <path class="a" d="M360 186 L410 186"/><path class="a" d="M585 222 L585 260"/><path class="a" d="M410 305 L380 305"/><path class="a" d="M220 350 L220 390"/><path class="a" d="M585 350 L585 390"/>

  <rect class="sec" x="820" y="90" width="870" height="1030"/>
  <text class="h" x="840" y="118">2) One Incoming Telegram Message (Webhook Path)</text>

  <rect class="box" x="850" y="150" width="320" height="70"/>
  <text class="t" x="874" y="180">Telegram -> POST `/webhook/telegram`</text><text class="t" x="874" y="200">(with secret header)</text>

  <rect class="box" x="1210" y="150" width="450" height="70"/>
  <text class="t" x="1235" y="180">app/api/webhooks.py::telegram_webhook()</text><text class="t" x="1235" y="200">validate secret -> channel.process_update(json)</text>

  <rect class="box" x="1210" y="255" width="450" height="70"/>
  <text class="t" x="1235" y="285">TelegramChannel.process_update() -> _handle_message()</text><text class="t" x="1235" y="305">allowlist check -> on_message callback</text>

  <rect class="box" x="1210" y="360" width="450" height="90"/>
  <text class="t" x="1235" y="390">app/bot.py::handle_incoming_message()</text>
  <text class="t" x="1235" y="412">_get_or_create_user() -> assemble_context()</text>
  <text class="t" x="1235" y="434">run_conversation(...deps...)</text>

  <polygon class="dec" points="1435,480 1580,560 1435,640 1290,560"/>
  <text class="t" x="1382" y="556">allowed +</text><text class="t" x="1370" y="576">not rate-limited?</text>

  <rect class="box" x="1110" y="530" width="150" height="60"/>
  <text class="t" x="1140" y="565">drop/deny</text>

  <rect class="box" x="1210" y="680" width="450" height="90"/>
  <text class="t" x="1235" y="710">Agent run details (app/agent/agent.py):</text>
  <text class="t" x="1235" y="732">LLMRouter + prompts + toolsets (Homey/Prom MCP)</text>
  <text class="t" x="1235" y="754">policy-gated Homey calls, optional confirmations</text>

  <rect class="box" x="1210" y="800" width="450" height="90"/>
  <text class="t" x="1235" y="830">Post-run persistence:</text>
  <text class="t" x="1235" y="852">save_message_pair(); update_snapshots_from_tool_calls()</text>
  <text class="t" x="1235" y="874">return response text</text>

  <rect class="box" x="850" y="800" width="320" height="90"/>
  <text class="t" x="874" y="830">TelegramChannel sends reply:</text>
  <text class="t" x="874" y="852">update.message.reply_text(response)</text>
  <text class="t" x="874" y="874">turn complete</text>

  <rect class="db" x="850" y="930" width="810" height="160"/>
  <text class="h" x="872" y="958">Support state loaded/updated during the turn</text>
  <text class="t" x="874" y="984">users.db: users/households/tasks/policies | memory.db: profiles/history/episodic | cache.db: snapshots/events/runs/pending</text>
  <text class="t" x="874" y="1008">MCPs: Homey + Prometheus | Background tasks: extraction/summarization scheduled asynchronously after response</text>

  <path class="a" d="M1170 186 L1210 186"/><path class="a" d="M1435 220 L1435 255"/><path class="a" d="M1435 325 L1435 360"/><path class="a" d="M1435 450 L1435 480"/>
  <path class="a" d="M1290 560 L1260 560"/><path class="a" d="M1435 640 L1435 680"/><path class="a" d="M1435 770 L1435 800"/><path class="a" d="M1210 845 L1170 845"/>
  <path class="a2" d="M1210 730 L1170 980"/><path class="a2" d="M1210 845 L1170 1008"/>

  <text class="s" x="30" y="1148">Focuses on primary production path. Dev differs mainly at launch mode (polling + local admin server).</text>
</svg>
