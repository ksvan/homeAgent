<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="980" viewBox="0 0 1500 980" role="img" aria-labelledby="title desc">
  <title id="title">HomeAgent High-Level Architecture</title>
  <desc id="desc">High-level architecture with API, agent runtime, tool layer, memory, scheduler and control plane.</desc>
  <defs>
    <style>
      .bg{fill:#f8fafc}.panel{fill:#fff;stroke:#0f172a;stroke-width:2;rx:12}.sub{fill:#eef2ff;stroke:#334155;stroke-width:1.5;rx:10}
      .title{font:700 28px 'Segoe UI',Arial,sans-serif;fill:#0f172a}.h{font:700 18px 'Segoe UI',Arial,sans-serif;fill:#0f172a}
      .t{font:14px 'Segoe UI',Arial,sans-serif;fill:#1e293b}.s{font:12px 'Segoe UI',Arial,sans-serif;fill:#334155}
      .a{stroke:#1d4ed8;stroke-width:2.4;fill:none;marker-end:url(#m)}.a2{stroke:#0f766e;stroke-width:2.2;fill:none;marker-end:url(#m2)}
    </style>
    <marker id="m" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L10,5 L0,10 z" fill="#1d4ed8"/></marker>
    <marker id="m2" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L10,5 L0,10 z" fill="#0f766e"/></marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1500" height="980"/>
  <text class="title" x="36" y="52">HomeAgent Architecture (High-Level)</text>

  <rect class="panel" x="60" y="90" width="1380" height="120"/>
  <text class="h" x="84" y="125">Ingress + Interfaces</text>
  <rect class="sub" x="84" y="142" width="220" height="46"/><text class="t" x="146" y="171">Telegram Users</text>
  <rect class="sub" x="330" y="142" width="260" height="46"/><text class="t" x="402" y="171">FastAPI (`/webhook`, `/health`)</text>
  <rect class="sub" x="616" y="142" width="260" height="46"/><text class="t" x="679" y="171">Admin UI (`/admin`, SSE)</text>
  <rect class="sub" x="902" y="142" width="240" height="46"/><text class="t" x="962" y="171">WhatsApp / Voice (future)</text>

  <rect class="panel" x="400" y="250" width="700" height="120"/>
  <text class="h" x="600" y="285">Agent Runtime</text>
  <text class="t" x="430" y="314">Message dispatcher -> context assembly -> prompt/deps -> LLM/tool execution -> response</text>
  <text class="t" x="430" y="338">Policy-gated Homey actions + callback confirmations + post-write verification</text>

  <rect class="panel" x="70" y="430" width="300" height="300"/>
  <text class="h" x="135" y="463">LLM Layer</text>
  <text class="t" x="92" y="500">LLM Router (`app/agent/llm_router.py`)</text>
  <text class="t" x="92" y="530">- Claude Sonnet/Haiku</text>
  <text class="t" x="92" y="555">- OpenAI GPT + embeddings</text>
  <text class="t" x="92" y="580">- Task-based model selection</text>

  <rect class="panel" x="410" y="430" width="340" height="300"/>
  <text class="h" x="498" y="463">Tool + Policy Layer</text>
  <text class="t" x="432" y="500">- Homey MCP (simple schema tools)</text>
  <text class="t" x="432" y="525">- Prometheus MCP (read-only)</text>
  <text class="t" x="432" y="550">- Policy gate + pending confirmations</text>
  <text class="t" x="432" y="575">- Reminder/action/memory tools</text>
  <text class="t" x="432" y="600">- Optional bash/python/search/scrape</text>

  <rect class="panel" x="790" y="430" width="300" height="300"/>
  <text class="h" x="855" y="463">Data + Memory</text>
  <text class="t" x="812" y="500">users.db (users, tasks, policies)</text>
  <text class="t" x="812" y="525">memory.db (profiles, convo, episodic)</text>
  <text class="t" x="812" y="550">cache.db (events, runs, snapshots)</text>
  <text class="t" x="812" y="575">sqlite-vec index (semantic recall)</text>

  <rect class="panel" x="1130" y="430" width="300" height="300"/>
  <text class="h" x="1206" y="463">Background Subsystems</text>
  <text class="t" x="1152" y="500">APScheduler (reminders/cleanup)</text>
  <text class="t" x="1152" y="525">Memory extraction + summarization</text>
  <text class="t" x="1152" y="550">Control plane event bus (SSE)</text>
  <text class="t" x="1152" y="575">Home profile refresh + cache upkeep</text>

  <path class="a" d="M304 165 L330 165"/>
  <path class="a" d="M590 165 L680 165"/>
  <path class="a" d="M460 188 L740 250"/>
  <path class="a" d="M750 370 L220 430"/>
  <path class="a" d="M750 370 L580 430"/>
  <path class="a" d="M750 370 L940 430"/>
  <path class="a" d="M750 370 L1280 430"/>
  <path class="a2" d="M580 730 L940 730"/>
  <path class="a2" d="M1280 730 L940 730"/>
  <path class="a2" d="M1280 660 L746 660"/>

  <text class="s" x="36" y="950">Updated export aligned to current app + docs architecture flow.</text>
</svg>
