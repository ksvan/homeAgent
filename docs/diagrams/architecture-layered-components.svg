<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1150" viewBox="0 0 1800 1150" role="img" aria-labelledby="title desc">
  <title id="title">HomeAgent Layered Components Architecture</title>
  <desc id="desc">Layered architecture map with external interfaces at the top, application and runtime layers in the middle, persistence at the bottom, and a support/control plane spanning the right side.</desc>
  <defs>
    <style>
      .bg { fill: #fbfbf7; }
      .layer { fill: #fffef2; stroke: #b8b36a; stroke-width: 1.4; rx: 10; }
      .support-layer { fill: #fff7ec; stroke: #c68a35; stroke-width: 1.6; rx: 10; }
      .title { font: 700 22px Arial, sans-serif; fill: #202020; }
      .layer-title { font: 700 17px Arial, sans-serif; fill: #2a2a2a; }
      .box-title { font: 700 14px Arial, sans-serif; fill: #202020; }
      .text { font: 13px Arial, sans-serif; fill: #303030; }
      .small { font: 12px Arial, sans-serif; fill: #404040; }
      .external { fill: #eef5ff; stroke: #4d79b8; }
      .adapter { fill: #f4f8f1; stroke: #6b8e23; }
      .business { fill: #f7f4e8; stroke: #8a6d3b; }
      .runtime { fill: #f3efff; stroke: #7c5ac2; }
      .capability { fill: #f1f7f7; stroke: #45818e; }
      .core { fill: #f8eeee; stroke: #b85c5c; }
      .data { fill: #f5f5f5; stroke: #666; }
      .support { fill: #fff4e8; stroke: #b7791f; }
      .admin { fill: #eef5ff; stroke: #4d79b8; }
      .component { stroke-width: 1.2; rx: 7; }
      .db-body { fill: #f5f5f5; stroke: #666; stroke-width: 1.2; }
      .db-top { fill: #fafafa; stroke: #666; stroke-width: 1.2; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1800" height="1150"/>
  <text class="title" x="40" y="40">HomeAgent Layered Components Architecture</text>

  <!-- Main vertical stack -->
  <rect class="layer" x="35" y="65" width="1335" height="125"/>
  <text class="layer-title" x="55" y="92">External Interfaces</text>
  <rect class="component external" x="70" y="110" width="245" height="58"/>
  <text class="box-title" x="192" y="134" text-anchor="middle">Telegram Bot API</text>
  <text class="small" x="192" y="154" text-anchor="middle">webhook updates + replies</text>
  <rect class="component external" x="345" y="110" width="245" height="58"/>
  <text class="box-title" x="467" y="134" text-anchor="middle">Homey / Homey Pro</text>
  <text class="small" x="467" y="154" text-anchor="middle">devices, zones, flows</text>
  <rect class="component external" x="620" y="110" width="210" height="58"/>
  <text class="box-title" x="725" y="134" text-anchor="middle">Prometheus</text>
  <text class="small" x="725" y="154" text-anchor="middle">metrics queries</text>
  <rect class="component external" x="860" y="110" width="245" height="58"/>
  <text class="box-title" x="982" y="134" text-anchor="middle">LLM Providers</text>
  <text class="small" x="982" y="154" text-anchor="middle">Anthropic + OpenAI</text>
  <rect class="component external" x="1135" y="110" width="200" height="58"/>
  <text class="box-title" x="1235" y="134" text-anchor="middle">Admin Browser</text>
  <text class="small" x="1235" y="154" text-anchor="middle">dashboard + SSE</text>

  <rect class="layer" x="35" y="215" width="1335" height="135"/>
  <text class="layer-title" x="55" y="242">Interface Adapters</text>
  <rect class="component adapter" x="70" y="265" width="235" height="58"/>
  <text class="box-title" x="187" y="289" text-anchor="middle">FastAPI Main App</text>
  <text class="small" x="187" y="309" text-anchor="middle">/webhook/telegram /health</text>
  <rect class="component adapter" x="330" y="265" width="235" height="58"/>
  <text class="box-title" x="447" y="289" text-anchor="middle">FastAPI Admin App</text>
  <text class="small" x="447" y="309" text-anchor="middle">/admin/* /stream</text>
  <rect class="component adapter" x="590" y="265" width="245" height="58"/>
  <text class="box-title" x="712" y="289" text-anchor="middle">Webhook Handlers</text>
  <text class="small" x="712" y="309" text-anchor="middle">Telegram + Homey events</text>
  <rect class="component adapter" x="860" y="265" width="205" height="58"/>
  <text class="box-title" x="962" y="289" text-anchor="middle">Channel Registry</text>
  <text class="small" x="962" y="309" text-anchor="middle">active delivery backend</text>
  <rect class="component adapter" x="1090" y="265" width="245" height="58"/>
  <text class="box-title" x="1212" y="289" text-anchor="middle">TelegramChannel</text>
  <text class="small" x="1212" y="309" text-anchor="middle">messages + callbacks</text>

  <rect class="layer" x="35" y="375" width="1335" height="155"/>
  <text class="layer-title" x="55" y="402">Application / Business Logic</text>
  <rect class="component business" x="70" y="425" width="190" height="70"/>
  <text class="box-title" x="165" y="450" text-anchor="middle">agent_run()</text>
  <text class="small" x="165" y="470" text-anchor="middle">unified entry point</text>
  <rect class="component business" x="285" y="425" width="245" height="70"/>
  <text class="box-title" x="407" y="448" text-anchor="middle">Context Assembly</text>
  <text class="small" x="407" y="468" text-anchor="middle">profiles, world, memories</text>
  <text class="small" x="407" y="486" text-anchor="middle">active task + pursuit state</text>
  <rect class="component business" x="555" y="425" width="170" height="70"/>
  <text class="box-title" x="640" y="450" text-anchor="middle">Task Service</text>
  <text class="small" x="640" y="470" text-anchor="middle">steps, links, resumes</text>
  <rect class="component business" x="750" y="425" width="245" height="70"/>
  <text class="box-title" x="872" y="448" text-anchor="middle">Autonomous Task Pursuit</text>
  <text class="small" x="872" y="468" text-anchor="middle">attempts, retry budget</text>
  <text class="small" x="872" y="486" text-anchor="middle">follow-ups, failure logic</text>
  <rect class="component business" x="1020" y="425" width="145" height="70"/>
  <text class="box-title" x="1092" y="450" text-anchor="middle">World Model</text>
  <text class="small" x="1092" y="470" text-anchor="middle">household state</text>
  <rect class="component business" x="1190" y="425" width="145" height="70"/>
  <text class="box-title" x="1262" y="450" text-anchor="middle">Memory</text>
  <text class="small" x="1262" y="470" text-anchor="middle">summaries, retrieval</text>

  <rect class="layer" x="35" y="555" width="1335" height="155"/>
  <text class="layer-title" x="55" y="582">Agent Runtime + Capability Adapters</text>
  <rect class="component runtime" x="70" y="605" width="225" height="70"/>
  <text class="box-title" x="182" y="630" text-anchor="middle">PydanticAI Agent</text>
  <text class="small" x="182" y="650" text-anchor="middle">conversation runtime</text>
  <rect class="component runtime" x="320" y="605" width="150" height="70"/>
  <text class="box-title" x="395" y="630" text-anchor="middle">LLM Router</text>
  <text class="small" x="395" y="650" text-anchor="middle">model selection</text>
  <rect class="component runtime" x="495" y="605" width="190" height="70"/>
  <text class="box-title" x="590" y="630" text-anchor="middle">Prompt + Skills</text>
  <text class="small" x="590" y="650" text-anchor="middle">registry + prompt files</text>
  <rect class="component capability" x="710" y="590" width="255" height="100"/>
  <text class="box-title" x="837" y="615" text-anchor="middle">Built-in Agent Tools</text>
  <text class="small" x="837" y="637" text-anchor="middle">memory, reminders, actions</text>
  <text class="small" x="837" y="655" text-anchor="middle">tasks, pursuit, prompts</text>
  <text class="small" x="837" y="673" text-anchor="middle">world model, event rules, skills</text>
  <rect class="component capability" x="990" y="605" width="150" height="70"/>
  <text class="box-title" x="1065" y="630" text-anchor="middle">Homey MCP</text>
  <text class="small" x="1065" y="650" text-anchor="middle">device tools</text>
  <rect class="component capability" x="1160" y="605" width="175" height="70"/>
  <text class="box-title" x="1247" y="630" text-anchor="middle">Prometheus MCP</text>
  <text class="small" x="1247" y="650" text-anchor="middle">metrics tools</text>

  <rect class="layer" x="35" y="735" width="1335" height="135"/>
  <text class="layer-title" x="55" y="762">Scheduler + Background Core</text>
  <rect class="component core" x="70" y="785" width="205" height="58"/>
  <text class="box-title" x="172" y="809" text-anchor="middle">App Lifespan</text>
  <text class="small" x="172" y="829" text-anchor="middle">startup + shutdown</text>
  <rect class="component core" x="300" y="785" width="170" height="58"/>
  <text class="box-title" x="385" y="809" text-anchor="middle">APScheduler</text>
  <text class="small" x="385" y="829" text-anchor="middle">timed jobs</text>
  <rect class="component core" x="495" y="785" width="260" height="58"/>
  <text class="box-title" x="625" y="809" text-anchor="middle">Jobs</text>
  <text class="small" x="625" y="829" text-anchor="middle">reminders, prompts, task resumes</text>
  <rect class="component core" x="780" y="785" width="210" height="58"/>
  <text class="box-title" x="885" y="809" text-anchor="middle">Cleanup Jobs</text>
  <text class="small" x="885" y="829" text-anchor="middle">retention + stale tasks</text>
  <rect class="component core" x="1015" y="785" width="320" height="58"/>
  <text class="box-title" x="1175" y="809" text-anchor="middle">Async Background Work</text>
  <text class="small" x="1175" y="829" text-anchor="middle">memory extraction, summaries, verification</text>

  <rect class="layer" x="35" y="895" width="1335" height="170"/>
  <text class="layer-title" x="55" y="922">Persistence Layer</text>
  <g transform="translate(75 950)">
    <path class="db-body" d="M0,18 C0,0 260,0 260,18 L260,82 C260,100 0,100 0,82 Z"/>
    <ellipse class="db-top" cx="130" cy="18" rx="130" ry="18"/>
    <text class="box-title" x="130" y="45" text-anchor="middle">users.db</text>
    <text class="small" x="130" y="65" text-anchor="middle">users, households, tasks, rules</text>
    <text class="small" x="130" y="83" text-anchor="middle">world model, scheduled prompts</text>
  </g>
  <g transform="translate(385 950)">
    <path class="db-body" d="M0,18 C0,0 260,0 260,18 L260,82 C260,100 0,100 0,82 Z"/>
    <ellipse class="db-top" cx="130" cy="18" rx="130" ry="18"/>
    <text class="box-title" x="130" y="45" text-anchor="middle">memory.db</text>
    <text class="small" x="130" y="65" text-anchor="middle">profiles, turns, summaries</text>
    <text class="small" x="130" y="83" text-anchor="middle">episodic memories</text>
  </g>
  <g transform="translate(695 950)">
    <path class="db-body" d="M0,18 C0,0 260,0 260,18 L260,82 C260,100 0,100 0,82 Z"/>
    <ellipse class="db-top" cx="130" cy="18" rx="130" ry="18"/>
    <text class="box-title" x="130" y="45" text-anchor="middle">cache.db</text>
    <text class="small" x="130" y="65" text-anchor="middle">pending actions, run logs</text>
    <text class="small" x="130" y="83" text-anchor="middle">events, snapshots</text>
  </g>
  <g transform="translate(1005 950)">
    <path class="db-body" d="M0,18 C0,0 260,0 260,18 L260,82 C260,100 0,100 0,82 Z"/>
    <ellipse class="db-top" cx="130" cy="18" rx="130" ry="18"/>
    <text class="box-title" x="130" y="45" text-anchor="middle">sqlite-vec</text>
    <text class="small" x="130" y="65" text-anchor="middle">memory embeddings</text>
    <text class="small" x="130" y="83" text-anchor="middle">semantic retrieval</text>
  </g>

  <!-- Side support plane -->
  <rect class="support-layer" x="1410" y="65" width="345" height="1000"/>
  <text class="layer-title" x="1430" y="95">Support / Control Plane</text>
  <rect class="component admin" x="1440" y="125" width="285" height="58"/>
  <text class="box-title" x="1582" y="149" text-anchor="middle">Admin Dashboard</text>
  <text class="small" x="1582" y="169" text-anchor="middle">tasks, events, scheduler, world model</text>
  <rect class="component support" x="1440" y="205" width="285" height="58"/>
  <text class="box-title" x="1582" y="229" text-anchor="middle">Admin SSE Event Stream</text>
  <text class="small" x="1582" y="249" text-anchor="middle">run, task, job, control events</text>
  <rect class="component support" x="1440" y="285" width="285" height="58"/>
  <text class="box-title" x="1582" y="309" text-anchor="middle">Inbound Event Bus</text>
  <text class="small" x="1582" y="329" text-anchor="middle">Homey and internal events</text>
  <rect class="component support" x="1440" y="365" width="285" height="58"/>
  <text class="box-title" x="1582" y="389" text-anchor="middle">Event Dispatcher + Rules</text>
  <text class="small" x="1582" y="409" text-anchor="middle">match, cooldown, quiet hours</text>
  <rect class="component support" x="1440" y="445" width="285" height="58"/>
  <text class="box-title" x="1582" y="469" text-anchor="middle">Control Task Resolver</text>
  <text class="small" x="1582" y="489" text-anchor="middle">reuse or create task-loop tasks</text>
  <rect class="component support" x="1440" y="525" width="285" height="58"/>
  <text class="box-title" x="1582" y="549" text-anchor="middle">Policy Gate</text>
  <text class="small" x="1582" y="569" text-anchor="middle">confirmation and safety decisions</text>
  <rect class="component support" x="1440" y="605" width="285" height="58"/>
  <text class="box-title" x="1582" y="629" text-anchor="middle">Pending Action Flow</text>
  <text class="small" x="1582" y="649" text-anchor="middle">Yes/No callbacks for risky actions</text>
  <rect class="component support" x="1440" y="685" width="285" height="58"/>
  <text class="box-title" x="1582" y="709" text-anchor="middle">Per-user Run Locks</text>
  <text class="small" x="1582" y="729" text-anchor="middle">serialize user-scoped runs</text>
  <rect class="component support" x="1440" y="765" width="285" height="58"/>
  <text class="box-title" x="1582" y="789" text-anchor="middle">Observability</text>
  <text class="small" x="1582" y="809" text-anchor="middle">run logs, events, health signals</text>
  <rect class="component support" x="1440" y="845" width="285" height="58"/>
  <text class="box-title" x="1582" y="869" text-anchor="middle">Recovery Controls</text>
  <text class="small" x="1582" y="889" text-anchor="middle">resume, cancel, inspect stuck work</text>
</svg>
