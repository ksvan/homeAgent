<svg xmlns="http://www.w3.org/2000/svg" width="1700" height="1050" viewBox="0 0 1700 1050" role="img" aria-labelledby="title desc">
  <title id="title">HomeAgent Dev vs Prod Setup from start.sh</title>
  <desc id="desc">Comparison of ./start.sh dev and ./start.sh prod startup and runtime flows.</desc>
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .lane { fill: #ffffff; stroke: #334155; stroke-width: 1.6; rx: 14; }
      .dev { fill: #ecfdf5; stroke: #047857; stroke-width: 1.4; rx: 10; }
      .prod { fill: #eff6ff; stroke: #1d4ed8; stroke-width: 1.4; rx: 10; }
      .shared { fill: #fefce8; stroke: #a16207; stroke-width: 1.4; rx: 10; }
      .title { font: 700 30px 'Segoe UI', Arial, sans-serif; fill: #0f172a; }
      .h2 { font: 700 18px 'Segoe UI', Arial, sans-serif; fill: #0f172a; }
      .txt { font: 13px 'Segoe UI', Arial, sans-serif; fill: #1e293b; }
      .small { font: 12px 'Segoe UI', Arial, sans-serif; fill: #334155; }
      .arrDev { stroke: #047857; stroke-width: 2.2; fill: none; marker-end: url(#mDev); }
      .arrProd { stroke: #1d4ed8; stroke-width: 2.2; fill: none; marker-end: url(#mProd); }
      .arrShared { stroke: #a16207; stroke-width: 2.2; fill: none; marker-end: url(#mShared); }
    </style>
    <marker id="mDev" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,5 L0,10 z" fill="#047857" />
    </marker>
    <marker id="mProd" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,5 L0,10 z" fill="#1d4ed8" />
    </marker>
    <marker id="mShared" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,5 L0,10 z" fill="#a16207" />
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1700" height="1050"/>
  <text class="title" x="30" y="55">Dev vs Prod Setup (from `start.sh`)</text>

  <rect class="shared" x="40" y="90" width="1620" height="110"/>
  <text class="h2" x="65" y="123">Shared Entry</text>
  <text class="txt" x="65" y="148">Launcher: `start.sh` (mode from first arg; default = `dev`)</text>
  <text class="txt" x="65" y="171">Both modes eventually run `python -m app`, which starts in `app/__main__.py` and applies Alembic migrations first.</text>

  <rect class="lane" x="40" y="230" width="790" height="760"/>
  <text class="h2" x="65" y="260">Development Path (`./start.sh dev`)</text>

  <rect class="lane" x="870" y="230" width="790" height="760"/>
  <text class="h2" x="895" y="260">Production Path (`./start.sh prod`)</text>

  <!-- DEV -->
  <rect class="dev" x="70" y="290" width="730" height="90"/>
  <text class="txt" x="95" y="320">start.sh checks `uv`, optionally starts Prometheus MCP sidecar process:</text>
  <text class="txt" x="95" y="342">`services/prometheus-mcp/.venv/bin/python app/main.py`</text>
  <text class="txt" x="95" y="364">then runs: `uv run python -m app`</text>

  <rect class="dev" x="70" y="420" width="730" height="110"/>
  <text class="txt" x="95" y="450">`app/__main__.py` -> `main()` -> `_run_migrations()`</text>
  <text class="txt" x="95" y="472">APP_ENV=development|test -> `_run_development()`</text>
  <text class="txt" x="95" y="494">configure logging, seed policies, start Homey MCP + Prom MCP, reload agent</text>
  <text class="txt" x="95" y="516">start scheduler + restore reminders/actions + cleanup jobs</text>

  <rect class="dev" x="70" y="570" width="730" height="110"/>
  <text class="txt" x="95" y="600">Create `TelegramChannel(on_message=handle_incoming_message)`</text>
  <text class="txt" x="95" y="622">Set channel registry</text>
  <text class="txt" x="95" y="644">Start admin UI FastAPI server in background on `settings.port`</text>
  <text class="txt" x="95" y="666">Start Telegram long polling (`channel.start_polling()`)</text>

  <rect class="dev" x="70" y="720" width="730" height="230"/>
  <text class="txt" x="95" y="750">Message handling (no webhook needed):</text>
  <text class="txt" x="95" y="772">Telegram update -> TelegramChannel._handle_message()</text>
  <text class="txt" x="95" y="794">allowlist check -> `handle_incoming_message()`</text>
  <text class="txt" x="95" y="816">get/create user -> `assemble_context()` (profiles/history/memory/snapshots)</text>
  <text class="txt" x="95" y="838">`run_conversation()` -> model + tools (+ policy gate via MCP callback)</text>
  <text class="txt" x="95" y="860">persist message pair + update state cache from tool calls</text>
  <text class="txt" x="95" y="882">reply with `update.message.reply_text(response)`</text>

  <!-- PROD -->
  <rect class="prod" x="900" y="290" width="730" height="90"/>
  <text class="txt" x="925" y="320">start.sh runs Docker Compose:</text>
  <text class="txt" x="925" y="342">`docker compose up --build -d`</text>
  <text class="txt" x="925" y="364">compose sets `APP_ENV=production`, `LOG_FORMAT=json`</text>

  <rect class="prod" x="900" y="420" width="730" height="110"/>
  <text class="txt" x="925" y="450">Container runs `python -m app` -> `app/__main__.py`</text>
  <text class="txt" x="925" y="472">`main()` -> `_run_migrations()` -> `_run_production()`</text>
  <text class="txt" x="925" y="494">starts uvicorn with `create_app()`</text>
  <text class="txt" x="925" y="516">FastAPI lifespan handles runtime initialization</text>

  <rect class="prod" x="900" y="570" width="730" height="140"/>
  <text class="txt" x="925" y="600">`app/api/server.py::_lifespan` startup:</text>
  <text class="txt" x="925" y="622">configure logging, seed policies</text>
  <text class="txt" x="925" y="644">start Homey MCP + Prom MCP, reload agent</text>
  <text class="txt" x="925" y="666">start scheduler + restore reminders + cleanup jobs</text>
  <text class="txt" x="925" y="688">create and initialize TelegramChannel; store in `app.state.telegram_channel`</text>

  <rect class="prod" x="900" y="740" width="730" height="210"/>
  <text class="txt" x="925" y="770">Message handling (webhook path):</text>
  <text class="txt" x="925" y="792">Telegram -> POST `/webhook/telegram`</text>
  <text class="txt" x="925" y="814">webhooks.py validates secret token header</text>
  <text class="txt" x="925" y="836">`channel.process_update(data)` -> Telegram handlers</text>
  <text class="txt" x="925" y="858">then same core path as dev: `handle_incoming_message()`</text>
  <text class="txt" x="925" y="880">context assembly -> run_conversation -> persist/cache update -> response</text>

  <!-- Arrows -->
  <path class="arrShared" d="M850 170 L850 230"/>

  <path class="arrDev" d="M435 380 L435 420"/>
  <path class="arrDev" d="M435 530 L435 570"/>
  <path class="arrDev" d="M435 680 L435 720"/>

  <path class="arrProd" d="M1265 380 L1265 420"/>
  <path class="arrProd" d="M1265 530 L1265 570"/>
  <path class="arrProd" d="M1265 710 L1265 740"/>

  <text class="small" x="40" y="1015">Source of truth: start.sh, app/__main__.py, app/api/server.py, app/api/webhooks.py, app/channels/telegram.py, app/bot.py.</text>
</svg>
