  <text class="t" x="1305" y="624">execute tool</text>
  <rect class="box" x="1445" y="590" width="140" height="56"/>
  <text class="t" x="1460" y="624">verify write</text>
  <rect class="box" x="1610" y="590" width="150" height="56"/>
  <text class="t" x="1633" y="624">save pending</text>
  <rect class="box" x="1785" y="590" width="135" height="56"/>
  <text class="t" x="1802" y="624">yes/no prompt</text>
  <rect class="box" x="1610" y="672" width="150" height="56"/>
  <text class="t" x="1642" y="706">callback</text>
  <rect class="box" x="1280" y="672" width="305" height="56"/>
  <text class="t" x="1329" y="706">run logs + pending audit trail</text>

  <rect class="box" x="1280" y="770" width="300" height="58"/>
  <text class="t" x="1315" y="804">fetch/parse ICS calendars (`httpx`)</text>
  <rect class="box" x="1610" y="770" width="310" height="58"/>
  <text class="t" x="1636" y="804">create/remove APScheduler schedules</text>
  <rect class="ext" x="1450" y="860" width="300" height="44"/>
  <text class="t" x="1519" y="888">Remote ICS feeds</text>

  <rect class="sec" x="30" y="764" width="1190" height="696"/>
  <text class="h" x="48" y="792">Persistence + Scheduler + Control Plane</text>

  <rect class="db" x="60" y="832" width="260" height="96"/>
  <text class="t" x="134" y="867">users.db</text>
  <text class="t" x="84" y="891">users, tasks, policies</text>
  <text class="t" x="84" y="913">calendars, scheduled_prompts</text>

  <rect class="db" x="350" y="832" width="260" height="96"/>
  <text class="t" x="420" y="867">memory.db</text>
  <text class="t" x="383" y="891">profiles, conversation pairs</text>
  <text class="t" x="392" y="913">episodic memories</text>

  <rect class="db" x="640" y="832" width="260" height="96"/>
  <text class="t" x="717" y="867">cache.db</text>
  <text class="t" x="665" y="891">events, runs, pending actions</text>
  <text class="t" x="675" y="913">snapshots, metrics state</text>

  <rect class="db" x="930" y="832" width="260" height="96"/>
  <text class="t" x="1003" y="867">sqlite-vec</text>
  <text class="t" x="968" y="891">episodic embedding index</text>

  <rect class="box" x="60" y="980" width="360" height="180"/>
  <text class="t" x="88" y="1014">Scheduler engine (`app/scheduler/*`)</text>
  <text class="t" x="88" y="1038">start/stop lifecycle</text>
  <text class="t" x="88" y="1062">restore reminders/actions</text>
  <text class="t" x="88" y="1086">restore scheduled prompts</text>
  <text class="t" x="88" y="1110">cleanup registration</text>

  <rect class="box" x="450" y="980" width="360" height="180"/>
  <text class="t" x="478" y="1014">Background memory tasks</text>
  <text class="t" x="478" y="1038">extract_and_store_memories</text>
  <text class="t" x="478" y="1062">maybe_summarize_conversation</text>
  <text class="t" x="478" y="1086">persist to memory DB + vector index</text>

  <rect class="box" x="840" y="980" width="350" height="180"/>
  <text class="t" x="868" y="1014">Control plane (`app/control/*`)</text>
  <text class="t" x="868" y="1038">/admin, /stats, /memory</text>
  <text class="t" x="868" y="1062">/scheduler, /stream, live tables</text>
  <text class="t" x="868" y="1086">SSE shutdown in FastAPI lifespan</text>

  <rect class="ext" x="840" y="1210" width="350" height="64"/>
  <text class="t" x="926" y="1242">Admin Dashboard + SSE clients</text>

