    </marker>
    <marker id="m2" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,5 L0,10 z" fill="#0f766e"/>
    </marker>
    <marker id="m3" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,5 L0,10 z" fill="#166534"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1980" height="1500"/>
  <text class="title" x="36" y="58">HomeAgent Detailed Software Architecture</text>

  <rect class="sec" x="30" y="94" width="460" height="640"/>
  <text class="h" x="48" y="122">Ingress + Channel</text>
  <rect class="box" x="60" y="150" width="180" height="58"/>
  <text class="t" x="102" y="184">Telegram Update</text>
  <rect class="box" x="270" y="150" width="190" height="58"/>
  <text class="t" x="295" y="184">POST `/webhook/telegram`</text>
  <rect class="box" x="270" y="240" width="190" height="58"/>
  <text class="t" x="301" y="274">secret header check</text>
  <rect class="box" x="270" y="330" width="190" height="58"/>
  <text class="t" x="308" y="364">TelegramChannel</text>
  <rect class="box" x="270" y="420" width="190" height="58"/>
  <text class="t" x="287" y="454">handle_incoming_message</text>
  <polygon class="dec" points="365,510 455,570 365,630 275,570"/>
  <text class="t" x="323" y="565">allowlist +</text>
  <text class="t" x="319" y="583">rate limit</text>
  <rect class="box" x="60" y="542" width="180" height="56"/>
  <text class="t" x="108" y="576">drop / throttle</text>
  <rect class="box" x="60" y="640" width="180" height="56"/>
  <text class="t" x="95" y="674">callback query flow</text>

  <rect class="sec" x="520" y="94" width="700" height="640"/>
  <text class="h" x="538" y="122">Command + Agent Core</text>
  <rect class="box" x="550" y="150" width="190" height="58"/>
  <text class="t" x="585" y="184">user lookup/create</text>
  <rect class="box" x="770" y="150" width="190" height="58"/>
  <text class="t" x="809" y="184">slash dispatcher</text>
  <polygon class="dec" points="1070,150 1150,179 1070,208 990,179"/>
  <text class="t" x="1035" y="183">text starts / ?</text>

  <rect class="box" x="550" y="250" width="190" height="58"/>
  <text class="t" x="576" y="284">assemble_context</text>
  <rect class="box" x="770" y="250" width="190" height="58"/>
  <text class="t" x="806" y="284">profiles / history</text>
  <rect class="box" x="990" y="250" width="190" height="58"/>
  <text class="t" x="1018" y="284">episodic recall</text>

  <rect class="box" x="660" y="360" width="420" height="84"/>
  <text class="t" x="728" y="393">run_conversation (PydanticAI Agent)</text>
  <text class="t" x="701" y="415">deps: run_id, household/user, date/time, memory context</text>
  <rect class="box" x="550" y="486" width="190" height="58"/>
  <text class="t" x="601" y="520">LLM Router</text>
  <rect class="box" x="770" y="486" width="190" height="58"/>
  <text class="t" x="811" y="510">Claude / OpenAI</text>
