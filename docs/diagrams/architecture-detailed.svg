<svg xmlns="http://www.w3.org/2000/svg" width="1980" height="1500" viewBox="0 0 1980 1500" role="img" aria-labelledby="title desc">
  <title id="title">HomeAgent Detailed Architecture</title>
  <desc id="desc">Detailed request and runtime flow covering webhook ingress, agent execution, tool routing, policy confirmation, calendars, scheduled prompts, persistence, scheduler, and control plane.</desc>
  <defs>
    <style>
      .bg{fill:#f8fafc}
      .sec{fill:#eef2ff;stroke:#475569;stroke-width:1.5;rx:14}
