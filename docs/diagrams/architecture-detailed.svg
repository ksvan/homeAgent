<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1280" viewBox="0 0 1800 1280" role="img" aria-labelledby="title desc">
  <title id="title">HomeAgent Detailed Architecture</title>
  <desc id="desc">Detailed runtime/component flow including webhook ingress, context assembly, agent run, policy confirmation loop, memory/background tasks and control plane.</desc>
  <defs>
    <style>
      .bg{fill:#f8fafc}.sec{fill:#eef2ff;stroke:#475569;stroke-width:1.4;rx:12}.box{fill:#fff;stroke:#0f172a;stroke-width:1.5;rx:10}
      .db{fill:#ecfeff;stroke:#155e75;stroke-width:1.5;rx:10}.dec{fill:#fef3c7;stroke:#92400e;stroke-width:1.5}
      .title{font:700 28px 'Segoe UI',Arial,sans-serif;fill:#0f172a}.h{font:700 16px 'Segoe UI',Arial,sans-serif;fill:#0f172a}
      .t{font:13px 'Segoe UI',Arial,sans-serif;fill:#1e293b}.a{stroke:#1d4ed8;stroke-width:2;fill:none;marker-end:url(#m)}.a2{stroke:#0f766e;stroke-width:2;fill:none;marker-end:url(#m2)}
    </style>
    <marker id="m" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L10,5 L0,10 z" fill="#1d4ed8"/></marker>
    <marker id="m2" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L10,5 L0,10 z" fill="#0f766e"/></marker>
  </defs>
  <rect class="bg" x="0" y="0" width="1800" height="1280"/>
  <text class="title" x="34" y="54">HomeAgent Detailed Software Architecture</text>

  <rect class="sec" x="28" y="92" width="520" height="520"/>
  <text class="h" x="46" y="118">Ingress + Channel</text>
  <rect class="box" x="58" y="145" width="190" height="56"/><text class="t" x="98" y="178">Telegram Update</text>
  <rect class="box" x="290" y="145" width="235" height="56"/><text class="t" x="310" y="178">`/webhook/telegram`</text>
  <rect class="box" x="290" y="235" width="235" height="56"/><text class="t" x="320" y="268">TelegramChannel</text>
  <rect class="box" x="290" y="325" width="235" height="56"/><text class="t" x="313" y="358">handle_incoming_message</text>
  <polygon class="dec" points="408,415 508,475 408,535 308,475"/><text class="t" x="346" y="472">allowlist +</text><text class="t" x="347" y="490">rate limit</text>
  <rect class="box" x="58" y="446" width="190" height="56"/><text class="t" x="106" y="479">drop/throttle</text>

  <rect class="sec" x="570" y="92" width="700" height="520"/>
  <text class="h" x="588" y="118">Context + Agent Core</text>
  <rect class="box" x="600" y="150" width="210" height="58"/><text class="t" x="623" y="183">user lookup/create</text>
  <rect class="box" x="850" y="150" width="210" height="58"/><text class="t" x="882" y="183">assemble_context</text>
  <rect class="box" x="1100" y="150" width="150" height="58"/><text class="t" x="1120" y="183">prompt loader</text>

  <rect class="box" x="600" y="245" width="210" height="58"/><text class="t" x="628" y="278">profiles/history</text>
  <rect class="box" x="850" y="245" width="210" height="58"/><text class="t" x="889" y="278">episodic recall</text>
  <rect class="box" x="1100" y="245" width="150" height="58"/><text class="t" x="1120" y="278">state cache</text>

  <rect class="box" x="760" y="350" width="330" height="78"/><text class="t" x="828" y="382">run_conversation</text><text class="t" x="814" y="402">PydanticAI Agent</text>
  <rect class="box" x="760" y="462" width="150" height="56"/><text class="t" x="793" y="494">LLM Router</text>
  <rect class="box" x="940" y="462" width="150" height="56"/><text class="t" x="960" y="486">Claude/OpenAI</text><text class="t" x="980" y="504">APIs</text>

  <rect class="sec" x="1290" y="92" width="482" height="700"/>
  <text class="h" x="1308" y="118">Tools + Policy + Confirmation Loop</text>
  <rect class="box" x="1322" y="145" width="420" height="58"/><text class="t" x="1358" y="178">Homey MCP process_tool_call (policy-gated)</text>
  <rect class="box" x="1322" y="232" width="420" height="58"/><text class="t" x="1472" y="265">policy evaluate</text>
  <polygon class="dec" points="1532,322 1662,386 1532,450 1402,386"/><text class="t" x="1473" y="390">confirm?</text>
  <rect class="box" x="1315" y="474" width="185" height="56"/><text class="t" x="1363" y="507">execute tool</text>
  <rect class="box" x="1530" y="474" width="220" height="56"/><text class="t" x="1562" y="507">save pending action</text>
  <rect class="box" x="1530" y="554" width="220" height="56"/><text class="t" x="1571" y="587">inline Yes/No prompt</text>
  <rect class="box" x="1530" y="634" width="220" height="56"/><text class="t" x="1580" y="667">callback query</text>
  <rect class="box" x="1315" y="554" width="185" height="56"/><text class="t" x="1350" y="587">post-write verify</text>
  <rect class="box" x="1315" y="634" width="185" height="56"/><text class="t" x="1360" y="667">run/event logs</text>
  <rect class="box" x="1322" y="722" width="420" height="52"/><text class="t" x="1368" y="754">Prometheus MCP calls (read-only, no policy gate)</text>

  <rect class="sec" x="28" y="640" width="1744" height="612"/>
  <text class="h" x="46" y="666">Persistence + Background + Control Plane</text>

  <rect class="db" x="60" y="700" width="250" height="88"/><text class="t" x="125" y="732">users.db</text><text class="t" x="95" y="754">users/tasks/policies</text>
  <rect class="db" x="340" y="700" width="250" height="88"/><text class="t" x="402" y="732">memory.db</text><text class="t" x="378" y="754">profiles/convo/episodic</text>
  <rect class="db" x="620" y="700" width="250" height="88"/><text class="t" x="690" y="732">cache.db</text><text class="t" x="650" y="754">snapshots/events/runs/pending</text>
  <rect class="db" x="900" y="700" width="250" height="88"/><text class="t" x="980" y="732">sqlite-vec</text><text class="t" x="950" y="754">episodic vector index</text>

  <rect class="box" x="60" y="830" width="500" height="180"/>
  <text class="t" x="90" y="860">Scheduler subsystem (`app/scheduler/*`)</text>
  <text class="t" x="90" y="884">- engine: lifecycle</text><text class="t" x="90" y="906">- reminders/actions: schedule + restore</text>
  <text class="t" x="90" y="928">- cleanup: retention jobs</text><text class="t" x="90" y="950">- jobs: reminder delivery</text>

  <rect class="box" x="600" y="830" width="500" height="180"/>
  <text class="t" x="630" y="860">Background memory tasks</text>
  <text class="t" x="630" y="884">- extraction (`memory/extraction.py`, Haiku)</text>
  <text class="t" x="630" y="906">- summarization (`memory/conversation.py`, Haiku)</text>
  <text class="t" x="630" y="928">triggered after response (non-blocking)</text>

  <rect class="box" x="1140" y="830" width="600" height="180"/>
  <text class="t" x="1170" y="860">Control plane + admin</text>
  <text class="t" x="1170" y="884">`/admin` API (`app/control/api.py`) + SSE bus (`app/control/events.py`)</text>
  <text class="t" x="1170" y="906">streams logs/job/extraction updates to dashboard</text>

  <!-- arrows -->
  <path class="a" d="M248 173 L290 173"/><path class="a" d="M408 201 L408 235"/><path class="a" d="M408 291 L408 325"/><path class="a" d="M525 352 L600 178"/>
  <path class="a" d="M408 381 L408 415"/><path class="a" d="M308 475 L248 475"/><path class="a" d="M508 475 L600 475"/>

  <path class="a" d="M810 179 L850 179"/><path class="a" d="M1060 179 L1100 179"/><path class="a" d="M705 208 L705 245"/><path class="a" d="M955 208 L955 245"/><path class="a" d="M1175 208 L1175 245"/>
  <path class="a" d="M705 303 L850 350"/><path class="a" d="M955 303 L925 350"/><path class="a" d="M1175 303 L1030 350"/>
  <path class="a" d="M1090 390 L1322 174"/><path class="a" d="M925 428 L835 462"/><path class="a" d="M925 428 L1015 462"/>

  <path class="a" d="M1532 203 L1532 232"/><path class="a" d="M1532 290 L1532 322"/><path class="a" d="M1402 386 L1408 474"/><path class="a" d="M1662 386 L1640 474"/>
  <path class="a" d="M1408 530 L1408 554"/><path class="a" d="M1640 530 L1640 554"/><path class="a" d="M1640 610 L1640 634"/><path class="a" d="M1530 662 L1500 662"/>

  <path class="a2" d="M600 178 L185 700"/><path class="a2" d="M600 274 L465 700"/><path class="a2" d="M955 303 L745 700"/><path class="a2" d="M955 303 L1025 700"/><path class="a2" d="M1408 690 L745 700"/>
  <path class="a2" d="M1408 610 L1408 700"/><path class="a2" d="M1408 690 L1408 830"/><path class="a2" d="M925 518 L850 830"/><path class="a2" d="M1408 722 L1408 830"/>

</svg>
